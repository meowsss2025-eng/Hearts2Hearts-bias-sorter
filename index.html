<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearts2hearts Bias Sorter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Quicksand',sans-serif;text-align:center;background:linear-gradient(160deg,#fff5c2,#ffeaa0,#fffde0);min-height:100vh;padding:24px 16px}
h1{font-size:1.8rem;font-weight:900;color:#d45c8a;margin-bottom:4px;letter-spacing:-0.5px}
#subtitle{font-size:0.85rem;color:#888;margin-bottom:16px}
#progress-wrap{display:inline-block;background:white;border:2px solid #e8c0d4;border-radius:999px;padding:6px 20px;margin-bottom:24px}
#progress{font-size:0.85rem;font-weight:700;color:#c45c8a;letter-spacing:1px}
#sorter{display:flex;justify-content:center;gap:12px}
.member{cursor:pointer;background:white;border-radius:20px;overflow:hidden;width:46vw;max-width:220px;box-shadow:0 6px 20px rgba(0,0,0,.12);transition:transform .15s ease,box-shadow .15s ease;border:2px solid transparent}
.member:hover{transform:scale(1.03);box-shadow:0 10px 28px rgba(212,92,138,.25);border-color:#f0a0c0}
.member:active{transform:scale(0.97)}
.member img{width:100%;height:72vw;max-height:400px;object-fit:cover;object-position:top;display:block}
.member-name{padding:10px 8px;font-size:1rem;font-weight:800;color:#333;background:white}
#results{margin-top:30px}
#results h2{font-size:1.4rem;font-weight:900;color:#d45c8a;margin-bottom:16px}
.result{margin:8px auto;width:90%;max-width:320px;background:white;padding:12px 16px;border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.08);font-size:1rem;font-weight:700;color:#333;text-align:left}
footer{margin-top:40px;display:flex;justify-content:center}
#logo-text{font-size:1.1rem;font-weight:900;color:#d45c8a;letter-spacing:1px}
</style>
</head>
<body>
<h1>💗 Hearts2hearts Bias Sorter</h1>
<p id="subtitle">Choose your favorite member in each battle!</p>
<div id="progress-wrap"><p id="progress"></p></div>
<div id="sorter">
<div class="member" onclick="pick('left')">
<img id="leftImg" src="" alt="Member">
<div class="member-name" id="leftName"></div>
</div>
<div class="member" onclick="pick('right')">
<img id="rightImg" src="" alt="Member">
<div class="member-name" id="rightName"></div>
</div>
</div>
<div id="results"></div>
<footer><div id="logo-text">made by @geurigonim</div></footer>
<script>
const members=[
{name:"Jiwoo",img:"https://n.uguu.se/zAeXfxGV.jpg"},
{name:"Carmen",img:"https://h.uguu.se/VwyeYehH.jpg"},
{name:"Yuha",img:"https://n.uguu.se/wDKplObL.jpg"},
{name:"Stella",img:"https://h.uguu.se/suZlEogG.jpg"},
{name:"Juun",img:"https://d.uguu.se/ReOLAxLA.jpg"},
{name:"A-na",img:"https://o.uguu.se/imEuEZfb.jpg"},
{name:"Ian",img:"https://d.uguu.se/ohEqNLSa.jpg"},
{name:"Ye-on",img:"https://d.uguu.se/bkrTdzdY.jpg"}
];
let scores={},matchups=[],current=0;
members.forEach(m=>scores[m.name]=0);
for(let i=0;i<members.length;i++)for(let j=i+1;j<members.length;j++)matchups.push([members[i],members[j]]);
matchups.sort(()=>Math.random()-0.5);
function loadMatch(){if(current>=matchups.length){showResults();return}const left=matchups[current][0],right=matchups[current][1];document.getElementById("leftImg").src=left.img;document.getElementById("leftName").textContent=left.name;document.getElementById("rightImg").src=right.img;document.getElementById("rightName").textContent=right.name;const pct=Math.round((current/matchups.length)*100);document.getElementById("progress").innerHTML=`Match ${current+1} of ${matchups.length} · ${pct}% SORTED`}
function pick(side){const left=matchups[current][0],right=matchups[current][1];if(side==="left")scores[left.name]++;else scores[right.name]++;current++;loadMatch()}
function showResults(){document.getElementById("sorter").style.display="none";document.getElementById("progress-wrap").style.display="none";document.getElementById("subtitle").style.display="none";const ranking=Object.entries(scores).sort((a,b)=>b[1]-a[1]);let html="<h2>🏆 Your Bias Ranking</h2>";ranking.forEach(([name],index)=>{const medal=index===0?"🥇":index===1?"🥈":index===2?"🥉":`#${index+1}`;html+=`<div class="result">${medal} ${name}</div>`});document.getElementById("results").innerHTML=html}
loadMatch();
</script>
</body>
</html>
