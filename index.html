<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hearts2hearts Bias Sorter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>💗 Hearts2hearts Bias Sorter</h1>
  <p id="subtitle">Choose your favorite member in each battle!</p>
  <div id="progress-wrap">
    <p id="progress">Match 1 of 28 · 0% SORTED</p>
  </div>
  <div id="sorter">
    <div class="member" onclick="pick('left')">
      <img id="leftImg" src="" alt="Member" />
      <div class="member-name" id="leftName"></div>
    </div>
    <div class="member" onclick="pick('right')">
      <img id="rightImg" src="" alt="Member" />
      <div class="member-name" id="rightName"></div>
    </div>
  </div>
  <div id="results"></div>
  <footer>
    <img src="Untitled99_20260621131941.png" alt="Hearts2hearts Logo" id="logo" />
  </footer>
  <script src="script.js"></script>
</body>
</html>
