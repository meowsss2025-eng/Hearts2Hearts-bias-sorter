<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hearts2hearts Bias Sorter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>💗 Hearts2hearts Bias Sorter</h1>
    <p id="progress"></p>

    <div id="sorter">
      <div class="member" onclick="pick('left')">
        <img id="leftImg" src="" alt="Member" />
        <h3 id="leftName"></h3>
      </div>

      <div class="member" onclick="pick('right')">
        <img id="rightImg" src="" alt="Member" />
        <h3 id="rightName"></h3>
      </div>
    </div>

    <div id="results"></div>

    <script src="script.js"></script>
  </body>
</html>
