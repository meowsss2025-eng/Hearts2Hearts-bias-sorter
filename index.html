<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hearts2hearts Bias Sorter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="top-bar">
    <button id="notice-btn" onclick="toggleNotice()">📢 Notice</button>
    <button id="lang-btn" onclick="toggleLangMenu()">🌐 Language</button>
    <div id="lang-menu">
      <button onclick="setLang('en')">English</button>
      <button onclick="setLang('ko')">한국어</button>
      <button onclick="setLang('zh')">中文</button>
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('id')">Indonesia</button>
      <button onclick="setLang('es')">Español</button>
    </div>
  </div>

  <div id="notice-modal">
    <div id="notice-box">
      <h2>📢 Notice</h2>
      <ul id="notice-list">
        <li>🆕 New languages added! English, Korean, Chinese, Japanese, Indonesian, and Spanish has been added on the "Change language" feature!!!</li>
      </ul>
      <button id="close-notice" onclick="toggleNotice()">✕ Close</button>
    </div>
  </div>

  <h1>💗 Hearts2hearts Bias Sorter</h1>
  <p id="subtitle">Choose your favorite member in each battle!</p>

  <div id="progress-wrap">
    <p id="progress"></p>
  </div>

  <div id="sorter">
    <div class="member" onclick="pick('left')">
      <img id="leftImg" src="" alt="Member" />
      <div class="member-name" id="leftName"></div>
    </div>
    <div class="member" onclick="pick('right')">
      <img id="rightImg" src="" alt="Member" />
      <div class="member-name" id="rightName"></div>
    </div>
  </div>

  <div id="results"></div>

  <footer>
    <div id="logo-text">made by @geurigonim</div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
